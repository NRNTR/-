<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>网络冲浪人格测试</title>
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
  background:
    radial-gradient(circle at top, rgba(0,180,255,0.15), transparent 35%),
    linear-gradient(180deg, #07111f 0%, #080817 55%, #05050d 100%);
  min-height: 100vh;
  color: #f5f7ff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 16px 60px;
}

.main-container {
  max-width: 920px;
  width: 100%;
}

.header {
  text-align: center;
  margin-bottom: 28px;
}

.header h1 {
  font-size: clamp(36px, 5vw, 64px);
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 22px #00d4ff, 0 0 48px rgba(0,200,255,0.4);
  letter-spacing: 3px;
  line-height: 1.2;
  margin-bottom: 8px;
}

.header .sub {
  font-size: 16px;
  color: rgba(180,210,255,0.6);
}

.card {
  background: rgba(17,19,40,0.94);
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: 18px;
  padding: 38px 34px;
  margin-bottom: 24px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

.version-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

.version-card {
  background: rgba(24,28,48,0.96);
  border: 1.5px solid rgba(255,255,255,0.18);
  border-radius: 14px;
  padding: 26px 22px;
  cursor: pointer;
  transition: all 0.25s;
  text-align: center;
  min-height: 150px;
}

.version-card:hover {
  border-color: #00e0ff;
  background: rgba(10,28,52,0.96);
  box-shadow: 0 0 24px rgba(0,224,255,0.15);
  transform: translateY(-2px);
}

.version-card.rec {
  border-color: rgba(0,224,255,0.55);
  box-shadow: 0 0 20px rgba(0,224,255,0.12);
}

.vc-badge {
  display: inline-block;
  background: linear-gradient(135deg, #00e0ff, #0068cc);
  color: #fff;
  font-size: 0.7em;
  padding: 3px 10px;
  border-radius: 10px;
  font-weight: 700;
  margin-bottom: 10px;
}

.vc-title {
  font-size: 1.3em;
  font-weight: 800;
  color: #fff;
  margin-bottom: 8px;
}

.vc-count {
  font-size: 0.9em;
  color: rgba(255,255,255,0.5);
  margin-bottom: 5px;
}

.vc-time {
  font-size: 0.8em;
  color: rgba(255,255,255,0.4);
  margin-bottom: 7px;
}

.vc-feature {
  font-size: 0.82em;
  color: rgba(200,210,230,0.55);
}

.hidden {
  display: none !important;
}

.btn {
  display: inline-block;
  padding: 12px 32px;
  border-radius: 10px;
  font-size: 1em;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s;
  border: none;
  font-family: inherit;
}

.btn-primary {
  background: linear-gradient(135deg, #00d0f8, #0078c0);
  color: #fff;
  box-shadow: 0 0 20px rgba(0,200,240,0.2);
  font-size: 1.15em;
  padding: 14px 44px;
}

.btn-primary:hover {
  box-shadow: 0 0 32px rgba(0,200,240,0.4);
  transform: translateY(-2px);
}

.btn-outline {
  background: transparent;
  border: 1.5px solid rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.7);
  padding: 10px 26px;
  font-size: 0.95em;
}

.btn-outline:hover {
  border-color: #00e0ff;
  color: #00e0ff;
  box-shadow: 0 0 12px rgba(0,224,255,0.15);
}

.progress-bar {
  height: 5px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 18px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #00f0ff, #0088cc);
  border-radius: 3px;
  transition: width 0.4s;
  box-shadow: 0 0 8px rgba(0,240,255,0.4);
}

.question-text {
  font-size: 28px;
  line-height: 1.4;
  margin-bottom: 22px;
  font-weight: 600;
  color: #fff;
}

.option-btn {
  display: block;
  width: 100%;
  text-align: left;
  padding: 18px 22px;
  margin-bottom: 14px;
  font-size: 17px;
  color: #e8ecf5;
  background: rgba(26,30,50,0.95);
  border: 1.5px solid rgba(255,255,255,0.16);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  line-height: 1.5;
}

.option-btn:hover {
  background: rgba(15,42,68,0.95);
  border-color: #00e0ff;
  color: #fff;
  box-shadow: 0 0 14px rgba(0,224,255,0.12);
}

.option-btn.selected {
  background: rgba(0,170,240,0.18);
  border-color: #00e0ff;
  color: #fff;
  box-shadow: 0 0 18px rgba(0,224,255,0.2);
}

.nav-btns {
  display: flex;
  gap: 10px;
  margin-top: 12px;
}

.result-header {
  text-align: center;
  margin-bottom: 18px;
}

.result-header h2 {
  font-size: 38px;
  font-weight: 900;
  color: #00e5ff;
  text-shadow: 0 0 16px rgba(0,229,255,0.25);
}

.rarity-pill {
  display: inline-block;
  padding: 6px 14px;
  border-radius: 20px;
  background: rgba(255,92,45,0.15);
  border: 1px solid rgba(255,128,80,0.6);
  color: #ffb299;
  font-size: 13px;
  margin-left: 8px;
  vertical-align: middle;
}

.result-desc {
  color: rgba(220,220,240,0.9);
  line-height: 1.85;
  margin-bottom: 20px;
  font-size: 1em;
}

.result-section {
  margin-bottom: 16px;
}

.result-section h4 {
  color: rgba(0,240,255,0.75);
  font-size: 0.95em;
  margin-bottom: 8px;
}

.trait-list {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.trait-pill {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid rgba(0,229,255,0.5);
  background: rgba(0,229,255,0.08);
  color: #d6f4ff;
  font-size: 0.82em;
}

.tip-box {
  color: rgba(200,200,220,0.7);
  font-size: 0.9em;
  line-height: 1.7;
  padding: 14px;
  border-radius: 10px;
  background: rgba(255,107,53,0.04);
  border: 1px solid rgba(255,107,53,0.12);
}

.quote-list p {
  color: rgba(170,180,200,0.65);
  font-size: 0.85em;
  padding: 3px 0;
}

.radar-container {
  display: flex;
  justify-content: center;
  margin: 20px 0;
}

.loading-wrap {
  text-align: center;
  padding: 60px 20px;
}

.loading-wrap .spinner {
  width: 40px;
  height: 40px;
  margin: 0 auto 16px;
  border: 3px solid rgba(255,255,255,0.08);
  border-top: 3px solid #00f0ff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

.loading-wrap p {
  font-size: 1.2em;
  color: rgba(255,255,255,0.85);
  margin-bottom: 20px;
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 999;
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: rgba(17,19,40,0.98);
  border: 1.5px solid rgba(0,224,255,0.4);
  border-radius: 16px;
  padding: 32px;
  max-width: 420px;
  width: 90%;
  text-align: center;
}

.modal-box h3 {
  color: #00e5ff;
  font-size: 1.3em;
  margin-bottom: 10px;
}

.modal-box .rarity-text {
  color: #ffb299;
  font-size: 0.95em;
  margin-bottom: 16px;
}

.share-section {
  text-align: center;
  margin-top: 18px;
  padding-top: 18px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

.share-section p {
  color: rgba(255,255,255,0.5);
  margin-bottom: 10px;
  font-size: 0.85em;
}

.footer {
  text-align: center;
  color: rgba(255,255,255,0.22);
  font-size: 0.75em;
  padding: 20px;
}

.error-box {
  color: #ffb299;
  line-height: 1.8;
  background: rgba(255,100,60,0.08);
  border: 1px solid rgba(255,100,60,0.25);
  border-radius: 12px;
  padding: 18px;
}

@media(max-width:720px) {
  .version-grid {
    grid-template-columns: 1fr;
  }

  .card {
    padding: 24px 18px;
  }

  .header h1 {
    font-size: 32px;
  }

  .question-text {
    font-size: 22px;
  }

  .option-btn {
    font-size: 15px;
    padding: 14px 18px;
  }

  .result-header h2 {
    font-size: 30px;
  }
}
</style>
</head>

<body>
<div class="main-container">

  <div class="header" id="quizTitle">
    <h1>网络冲浪人格测试</h1>
    <p class="sub">发现你在数字世界的真实面貌 · 多版本可选 · 赛博人格分析</p>
  </div>

  <div id="bootPage">
    <div class="card loading-wrap">
      <div class="spinner"></div>
      <p>正在加载题库...</p>
      <div class="progress-bar">
        <div class="progress-fill" style="width:45%"></div>
      </div>
    </div>
  </div>

  <div id="homePage" class="hidden">
    <div class="card">
      <p style="text-align:center;color:rgba(255,255,255,0.6);margin-bottom:16px;font-size:15px">
        选择测试版本，开始你的赛博人格之旅
      </p>

      <div class="version-grid">
        <div class="version-card" onclick="startQuiz(12)">
          <div class="vc-title">速测版</div>
          <div class="vc-count">12 题</div>
          <div class="vc-time">约 2 分钟</div>
          <div class="vc-feature">快速筛查 · 了解基本倾向</div>
        </div>

        <div class="version-card rec" onclick="startQuiz(24)">
          <div class="vc-badge">推荐</div>
          <div class="vc-title">标准版</div>
          <div class="vc-count">24 题</div>
          <div class="vc-time">约 4 分钟</div>
          <div class="vc-feature">平衡深度与效率</div>
        </div>

        <div class="version-card" onclick="startQuiz(48)">
          <div class="vc-title">进阶版</div>
          <div class="vc-count">48 题</div>
          <div class="vc-time">约 8 分钟</div>
          <div class="vc-feature">深度分析 · 更多维度</div>
        </div>

        <div class="version-card rec" onclick="startQuiz(64)">
          <div class="vc-badge">推荐</div>
          <div class="vc-title">深度版</div>
          <div class="vc-count">64 题</div>
          <div class="vc-time">约 12 分钟</div>
          <div class="vc-feature">最精准 · 完整人格画像</div>
        </div>
      </div>
    </div>
  </div>

  <div id="quizPage" class="hidden">
    <div class="card" style="min-height:55vh">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <div id="questionArea"></div>

      <div class="nav-btns">
        <button class="btn btn-outline hidden" id="prevBtn" onclick="prevQuestion()">上一题</button>
      </div>
    </div>
  </div>

  <div id="loadingPage" class="hidden">
    <div class="card loading-wrap">
      <div class="spinner"></div>
      <p>正在生成你的人格测评...</p>
      <div class="progress-bar">
        <div class="progress-fill" id="loadProgressFill" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div id="resultPage" class="hidden">
    <div class="card">
      <div id="screenshotTarget">
        <div class="result-header" id="resultHeader"></div>
        <div class="result-desc" id="resultDesc"></div>
        <div class="result-section" id="resultTraits"></div>
        <div class="result-section" id="resultQuotes"></div>
        <div class="radar-container">
          <canvas id="radarCanvas"></canvas>
        </div>
        <div class="result-section" id="resultTip"></div>
      </div>

      <div class="share-section">
        <p>分享你的赛博人格身份</p>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
          <button class="btn btn-outline" onclick="copyResultText()">复制结果文字</button>
          <button class="btn btn-outline" onclick="restartQuiz()">重新测试</button>
        </div>
      </div>
    </div>
  </div>

  <div id="errorPage" class="hidden">
    <div class="card">
      <div class="error-box" id="errorBox"></div>
    </div>
  </div>

  <div id="modalOverlay" class="modal-overlay">
    <div class="modal-box" id="modalBox"></div>
  </div>

  <div class="footer">网络冲浪人格测试 · 仅供娱乐参考</div>

</div>

<script>
var SOURCE_URL = 'https://oss-sy.lra.cn/file/upload/2026/06/11/2065096693128368128.txt';

var ALL_QUESTIONS = [];
var PERSONALITIES = [];
var MAIN_DIMS = {};

var currentVersion = 24;
var currentQuestion = 0;
var answers = [];
var totalQuestions = 24;
var scores = {};
var dimKeys = [];
var MD = {};
var lastResultText = '';

var DC = {
  N: '#00e5ff',
  E: '#ff7043',
  A: '#e91e63',
  Ac: '#ffc107',
  So: '#4caf50'
};

function escapeHtml(str) {
  return String(str == null ? '' : str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function showPage(id) {
  var pages = [
    'bootPage',
    'homePage',
    'quizPage',
    'resultPage',
    'loadingPage',
    'errorPage'
  ];

  for (var i = 0; i < pages.length; i++) {
    var e = document.getElementById(pages[i]);
    if (e) e.classList.add('hidden');
  }

  var t = document.getElementById(id);
  if (t) t.classList.remove('hidden');
}

function showError(msg) {
  var box = document.getElementById('errorBox');
  if (box) {
    box.innerHTML =
      '<h3 style="margin-bottom:10px;color:#ffb299;">题库加载失败</h3>' +
      '<p>' + escapeHtml(msg) + '</p>' +
      '<p style="margin-top:12px;">可能原因：</p>' +
      '<p>1. 当前电脑没有联网。</p>' +
      '<p>2. 浏览器阻止了本地 HTML 跨域读取远程 TXT。</p>' +
      '<p>3. 题库地址临时不可访问。</p>' +
      '<p style="margin-top:12px;">如果出现这个提示，把这个错误截图发给我，我再给你做“题库内嵌版”。</p>';
  }
  showPage('errorPage');
}

function findMatchingEnd(text, startIndex) {
  var open = text[startIndex];
  var close = open === '[' ? ']' : '}';
  var depth = 0;
  var inString = false;
  var quote = '';
  var escape = false;

  for (var i = startIndex; i < text.length; i++) {
    var ch = text[i];

    if (inString) {
      if (escape) {
        escape = false;
      } else if (ch === '\\') {
        escape = true;
      } else if (ch === quote) {
        inString = false;
        quote = '';
      }
      continue;
    }

    if (ch === '"' || ch === "'") {
      inString = true;
      quote = ch;
      continue;
    }

    if (ch === open) {
      depth++;
    } else if (ch === close) {
      depth--;
      if (depth === 0) {
        return i;
      }
    }
  }

  return -1;
}

function extractVarLiteral(source, varName) {
  var key = 'var ' + varName;
  var idx = source.indexOf(key);

  if (idx < 0) {
    throw new Error('找不到变量：' + varName);
  }

  var eq = source.indexOf('=', idx);
  if (eq < 0) {
    throw new Error('变量没有等号：' + varName);
  }

  var arrStart = source.indexOf('[', eq);
  var objStart = source.indexOf('{', eq);

  var start = -1;

  if (arrStart >= 0 && objStart >= 0) {
    start = Math.min(arrStart, objStart);
  } else {
    start = Math.max(arrStart, objStart);
  }

  if (start < 0) {
    throw new Error('变量不是数组或对象：' + varName);
  }

  var end = findMatchingEnd(source, start);

  if (end < 0) {
    throw new Error('变量结构不完整：' + varName);
  }

  return source.slice(start, end + 1);
}

function parseDataFromSource(source) {
  var qLiteral = extractVarLiteral(source, 'ALL_QUESTIONS');
  var pLiteral = extractVarLiteral(source, 'PERSONALITIES');
  var dLiteral = extractVarLiteral(source, 'MAIN_DIMS');

  ALL_QUESTIONS = Function('"use strict"; return (' + qLiteral + ');')();
  PERSONALITIES = Function('"use strict"; return (' + pLiteral + ');')();
  MAIN_DIMS = Function('"use strict"; return (' + dLiteral + ');')();

  if (!Array.isArray(ALL_QUESTIONS) || ALL_QUESTIONS.length === 0) {
    throw new Error('ALL_QUESTIONS 为空');
  }

  if (!Array.isArray(PERSONALITIES) || PERSONALITIES.length === 0) {
    throw new Error('PERSONALITIES 为空');
  }

  initDims();
}

function initDims() {
  dimKeys = [];
  MD = MAIN_DIMS.main_dims || MAIN_DIMS;

  for (var k in MD) {
    if (MD[k] && MD[k].sub) {
      MD[k].sub.forEach(function(s) {
        if (dimKeys.indexOf(s) === -1) {
          dimKeys.push(s);
        }
      });
    }

    if (!MD[k].color) {
      MD[k].color = DC[k] || '#00e5ff';
    }

    if (!MD[k].label) {
      MD[k].label = MAIN_DIMS.dim_labels ? MAIN_DIMS.dim_labels[k] : k;
    }
  }

  scores = resetScores();
}

function resetScores() {
  var s = {};
  for (var i = 0; i < dimKeys.length; i++) {
    s[dimKeys[i]] = 0;
  }
  return s;
}

function getQuestionText(q) {
  if (!q) return '';
  if (Array.isArray(q)) return q[1] || '';
  return q.text || '';
}

function getQuestionOptions(q) {
  if (!q) return [];
  if (Array.isArray(q)) return q[3] || [];
  return q.options || [];
}

function getOptionText(opt) {
  if (!opt) return '';
  if (Array.isArray(opt)) return opt[0] || '';
  return opt.txt || opt.text || '';
}

function getOptionScores(opt) {
  if (!opt) return {};
  if (Array.isArray(opt)) return opt[1] || {};
  return opt.scores || {};
}

function startQuiz(num) {
  currentVersion = num;
  totalQuestions = Math.min(num, ALL_QUESTIONS.length);
  currentQuestion = 0;
  answers = [];
  scores = resetScores();

  var title = document.getElementById('quizTitle');
  if (title) title.style.display = 'none';

  showPage('quizPage');
  renderQuestion();
  window.scrollTo(0, 0);
}

function renderQuestion() {
  var q = ALL_QUESTIONS[currentQuestion];

  if (!q) {
    document.getElementById('questionArea').innerHTML =
      '<div class="question-text">题目加载失败，请返回重试。</div>';
    return;
  }

  var questionText = getQuestionText(q);
  var options = getQuestionOptions(q);

  var h = '';
  h += '<div class="question-text">';
  h += (currentQuestion + 1) + '. ' + escapeHtml(questionText);
  h += '</div>';

  if (!options || !options.length) {
    h += '<div class="error-box">当前题目没有选项，请检查题库数据。</div>';
  } else {
    for (var i = 0; i < options.length; i++) {
      var sel = answers[currentQuestion] === i ? ' selected' : '';
      h += '<button type="button" class="option-btn' + sel + '" onclick="selectOption(' + i + ')">';
      h += escapeHtml(getOptionText(options[i]));
      h += '</button>';
    }
  }

  var area = document.getElementById('questionArea');
  if (area) area.innerHTML = h;

  var fill = document.getElementById('progressFill');
  if (fill) {
    fill.style.width = (((currentQuestion + 1) / totalQuestions) * 100) + '%';
  }

  var prev = document.getElementById('prevBtn');
  if (prev) {
    prev.classList.toggle('hidden', currentQuestion === 0);
  }
}

function recalcScores() {
  scores = resetScores();

  for (var qi = 0; qi < answers.length; qi++) {
    if (answers[qi] === undefined || answers[qi] === null) continue;

    var q = ALL_QUESTIONS[qi];
    var options = getQuestionOptions(q);
    var opt = options[answers[qi]];

    if (!opt) continue;

    var scoreObj = getOptionScores(opt);

    for (var k in scoreObj) {
      scores[k] = (scores[k] || 0) + scoreObj[k];
    }
  }
}

function selectOption(idx) {
  answers[currentQuestion] = idx;
  recalcScores();

  var btns = document.querySelectorAll('.option-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('selected', i === idx);
  }

  setTimeout(function() {
    if (currentQuestion < totalQuestions - 1) {
      currentQuestion++;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
      recalcScores();
      showPage('loadingPage');
      animateLoading();
    }
  }, 180);
}

function prevQuestion() {
  if (currentQuestion > 0) {
    currentQuestion--;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function animateLoading() {
  var fill = document.getElementById('loadProgressFill');

  if (!fill) {
    setTimeout(calcResult, 400);
    return;
  }

  var w = 0;
  fill.style.width = '0%';

  var iv = setInterval(function() {
    w += 5;
    fill.style.width = w + '%';

    if (w >= 100) {
      clearInterval(iv);
      setTimeout(calcResult, 200);
    }
  }, 40);
}

function calcMainDimScores() {
  var m = {};

  for (var k in MD) {
    if (MD[k] && MD[k].sub) {
      var t = 0;
      MD[k].sub.forEach(function(s) {
        t += scores[s] || 0;
      });
      m[k] = t;
    }
  }

  return m;
}

function normalizeScores(main) {
  var n = {};
  var answeredCount = Math.max(1, answers.filter(function(a) {
    return a !== undefined && a !== null;
  }).length);

  for (var k in main) {
    var maxPerDim = answeredCount * 3;
    n[k] = Math.min(100, Math.round((main[k] / Math.max(1, maxPerDim)) * 100));
  }

  return n;
}

function calcSubNormScores() {
  var n = {};
  var answeredCount = Math.max(1, answers.filter(function(a) {
    return a !== undefined && a !== null;
  }).length);

  for (var i = 0; i < dimKeys.length; i++) {
    var k = dimKeys[i];
    n[k] = Math.min(100, Math.round(((scores[k] || 0) / Math.max(1, answeredCount * 3)) * 100));
  }

  return n;
}

function classifyLevel(v) {
  if (v >= 70) return 'H';
  if (v >= 40) return 'M';
  return 'L';
}

function normalizePatternValue(v) {
  var p = String(v || '').toUpperCase();

  if (p === 'HIGH') return 'H';
  if (p === 'MID') return 'M';
  if (p === 'MIDDLE') return 'M';
  if (p === 'LOW') return 'L';

  return p;
}

function nearMatch(patternValue, levelValue) {
  var p = normalizePatternValue(patternValue);

  if (p === 'H' && levelValue === 'M') return true;
  if (p === 'M' && levelValue !== 'L') return true;
  if (p === 'L' && levelValue === 'M') return true;

  return false;
}

function matchPersonality(norm) {
  var subNorm = calcSubNormScores();
  var merged = {};

  for (var k in norm) merged[k] = norm[k];
  for (var s in subNorm) merged[s] = subNorm[s];

  var lv = {};
  for (var key in merged) {
    lv[key] = classifyLevel(merged[key]);
  }

  var best = null;
  var bestScore = -999;

  PERSONALITIES.forEach(function(p) {
    var pat = p.pattern || {};
    var sc = 0;

    for (var dk in pat) {
      if (lv[dk] === undefined) continue;

      var pv = normalizePatternValue(pat[dk]);

      if (pv === lv[dk]) {
        sc += 3;
      } else if (nearMatch(pv, lv[dk])) {
        sc += 1;
      } else {
        sc -= 1;
      }
    }

    if (sc > bestScore) {
      bestScore = sc;
      best = p;
    }
  });

  return best || PERSONALITIES[0];
}

var modalCb = null;

function showModal(t, b, cb) {
  modalCb = cb;

  var modalBox = document.getElementById('modalBox');
  var ov = document.getElementById('modalOverlay');

  if (!modalBox || !ov) {
    if (cb) cb();
    return;
  }

  modalBox.innerHTML =
    '<h3>' + escapeHtml(t) + '</h3>' +
    '<div class="rarity-text">' + escapeHtml(b) + '</div>' +
    '<button class="btn btn-primary" onclick="closeModal()">确认</button>';

  ov.style.display = 'flex';
}

function closeModal() {
  var ov = document.getElementById('modalOverlay');
  if (ov) ov.style.display = 'none';

  var cb = modalCb;
  modalCb = null;

  if (cb) cb();
}

function getRarityPercent(p) {
  var r = p.rarity || '';

  if (r.indexOf('传说') !== -1) {
    return (Math.random() * 2 + 1).toFixed(1);
  }

  if (r.indexOf('稀有') !== -1) {
    return (Math.random() * 5 + 4).toFixed(1);
  }

  return (Math.random() * 12 + 10).toFixed(1);
}

function calcResult() {
  recalcScores();

  var main = calcMainDimScores();
  var norm = normalizeScores(main);
  var p = matchPersonality(norm);
  var rp = getRarityPercent(p);

  showModal(
    '你的结果：' + p.name,
    '稀有度：约占测试人群 ' + rp + '%',
    function() {
      renderResult(p, norm, rp);
    }
  );
}

function renderResult(p, norm, rp) {
  showPage('resultPage');

  var resultHeader = document.getElementById('resultHeader');
  var resultDesc = document.getElementById('resultDesc');
  var resultTraits = document.getElementById('resultTraits');
  var resultQuotes = document.getElementById('resultQuotes');
  var resultTip = document.getElementById('resultTip');

  var name = p.name || '未知人格';
  var desc = p.desc || '';
  var suggestions = p.suggestions || p.tip || '';
  var comments = p.common_comments || p.quotes || [];
  var traits = p.traits || [];

  if (resultHeader) {
    resultHeader.innerHTML =
      '<h2>' +
      escapeHtml(name) +
      '<span class="rarity-pill">稀有度 ' + escapeHtml(rp) + '%</span>' +
      '</h2>';
  }

  if (resultDesc) {
    resultDesc.textContent = desc;
  }

  if (resultTraits) {
    var th = '<h4>核心特质</h4><div class="trait-list">';
    traits.forEach(function(t) {
      th += '<span class="trait-pill">' + escapeHtml(t) + '</span>';
    });
    th += '</div>';
    resultTraits.innerHTML = th;
  }

  if (resultQuotes) {
    if (comments.length) {
      resultQuotes.innerHTML =
        '<h4 style="margin-top:12px">常见评价</h4>' +
        '<div class="quote-list">' +
        comments.map(function(q) {
          return '<p>“' + escapeHtml(q) + '”</p>';
        }).join('') +
        '</div>';
    } else {
      resultQuotes.innerHTML = '';
    }
  }

  if (resultTip) {
    resultTip.innerHTML =
      '<h4>给你的建议</h4>' +
      '<div class="tip-box">' +
      escapeHtml(suggestions) +
      '</div>';
  }

  lastResultText =
    '我的网络冲浪人格测试结果：' + name + '\n' +
    '稀有度：约占测试人群 ' + rp + '%\n\n' +
    desc + '\n\n' +
    '核心特质：' + traits.join('、') + '\n\n' +
    '建议：' + suggestions;

  setTimeout(function() {
    drawRadar(norm, ['N', 'E', 'A', 'Ac', 'So']);
  }, 300);

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function drawRadar(norm, dimOrder) {
  var c = document.getElementById('radarCanvas');
  if (!c) return;

  var parentWidth = c.parentElement ? c.parentElement.clientWidth : 380;
  var size = Math.min(420, Math.max(280, parentWidth));

  c.width = size;
  c.height = size;

  var ctx = c.getContext('2d');
  var cx = size / 2;
  var cy = size / 2;
  var r = size * 0.33;
  var n = dimOrder.length;

  ctx.clearRect(0, 0, size, size);

  for (var l = 1; l <= 4; l++) {
    ctx.beginPath();

    for (var i = 0; i <= n; i++) {
      var a = Math.PI / 2 + (i % n) * 2 * Math.PI / n;
      var rr = r * l / 4;
      var x = cx + rr * Math.cos(a);
      var y = cy - rr * Math.sin(a);

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }

    ctx.closePath();
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  for (var j = 0; j < n; j++) {
    var a2 = Math.PI / 2 + j * 2 * Math.PI / n;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + r * Math.cos(a2), cy - r * Math.sin(a2));
    ctx.strokeStyle = 'rgba(255,255,255,0.14)';
    ctx.stroke();

    var label = MD[dimOrder[j]] && MD[dimOrder[j]].label
      ? MD[dimOrder[j]].label
      : dimOrder[j];

    ctx.fillStyle = '#dffaff';
    ctx.font = 'bold 14px Microsoft YaHei, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, cx + (r + 34) * Math.cos(a2), cy - (r + 34) * Math.sin(a2));
  }

  ctx.beginPath();

  for (var k = 0; k <= n; k++) {
    var a3 = Math.PI / 2 + (k % n) * 2 * Math.PI / n;
    var dim = dimOrder[k % n];
    var v = (norm[dim] || 0) / 100;
    var rr2 = r * v;
    var x2 = cx + rr2 * Math.cos(a3);
    var y2 = cy - rr2 * Math.sin(a3);

    if (k === 0) ctx.moveTo(x2, y2);
    else ctx.lineTo(x2, y2);
  }

  ctx.closePath();
  ctx.fillStyle = 'rgba(0,229,255,0.16)';
  ctx.fill();

  ctx.strokeStyle = '#00e5ff';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  for (var m = 0; m < n; m++) {
    var a4 = Math.PI / 2 + m * 2 * Math.PI / n;
    var dim2 = dimOrder[m];
    var v2 = (norm[dim2] || 0) / 100;
    var rr3 = r * v2;

    ctx.beginPath();
    ctx.arc(cx + rr3 * Math.cos(a4), cy - rr3 * Math.sin(a4), 5, 0, 2 * Math.PI);
    ctx.fillStyle = '#ff7043';
    ctx.fill();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

function copyResultText() {
  if (!lastResultText) {
    alert('暂无结果可复制');
    return;
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(lastResultText).then(function() {
      alert('结果文字已复制');
    }).catch(function() {
      fallbackCopy(lastResultText);
    });
  } else {
    fallbackCopy(lastResultText);
  }
}

function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.left = '-9999px';
  document.body.appendChild(ta);
  ta.select();

  try {
    document.execCommand('copy');
    alert('结果文字已复制');
  } catch (e) {
    alert('复制失败，请手动复制结果文字');
  }

  document.body.removeChild(ta);
}

function restartQuiz() {
  scores = resetScores();
  answers = [];
  currentQuestion = 0;
  totalQuestions = currentVersion;

  var title = document.getElementById('quizTitle');
  if (title) title.style.display = '';

  showPage('homePage');
  window.scrollTo(0, 0);
}

function loadSource() {
  showPage('bootPage');

  fetch(SOURCE_URL + '?t=' + Date.now())
    .then(function(res) {
      if (!res.ok) {
        throw new Error('网络请求失败，状态码：' + res.status);
      }
      return res.text();
    })
    .then(function(text) {
      parseDataFromSource(text);

      var title = document.getElementById('quizTitle');
      if (title) title.style.display = '';

      showPage('homePage');
    })
    .catch(function(err) {
      showError(err.message || String(err));
    });
}

window.addEventListener('DOMContentLoaded', function() {
  loadSource();
});
</script>
